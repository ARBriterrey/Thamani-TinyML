; =============================================================================
; Thamani-TinyML – ESP32 Network Bridge
; =============================================================================
; Target board : Standard ESP32 DevKit V1 (no PSRAM required)
; Framework    : Arduino
; Transport    : mTLS HTTPS → edge.thamanihc.com
; Protocol     : Chunked binary upload via /api/upload/{init,chunk,finish}
; =============================================================================

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; Serial monitor
monitor_speed = 115200

; Build flags — increase stack & heap available to TLS tasks
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DCONFIG_ARDUINO_LOOP_STACK_SIZE=8192

; Required libraries
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0
