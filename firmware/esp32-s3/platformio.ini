; =============================================================================
; Thamani-TinyML – ESP32 Network Bridge
; =============================================================================
; Transport  : mTLS HTTPS → edge.thamanihc.com
; Protocol   : Chunked binary upload via /api/upload/{init,chunk,finish}
;
; Environments:
;   esp32s3   → ESP32-S3 DevKitC-1  (current test board)
;   esp32dev  → Standard ESP32 DevKit V1  (final production board)
;
; Flash commands:
;   pio run -e esp32s3  --target upload   (testing)
;   pio run -e esp32dev --target upload   (production)
; =============================================================================

; ---------------------------------------------------------------------------
; Shared settings across all environments
; ---------------------------------------------------------------------------
[common]
framework = arduino
monitor_speed = 115200

build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DCONFIG_ARDUINO_LOOP_STACK_SIZE=8192

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0

; ---------------------------------------------------------------------------
; TEST board — ESP32-S3-WROOM-1-N16R8 (16 MB Flash, 8 MB PSRAM)
; ---------------------------------------------------------------------------
[env:esp32s3]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
board_build.flash_size   = 16MB
board_build.arduino.memory_type = qio_opi   ; enables octal-SPI PSRAM (R8)
build_flags   =
    ${common.build_flags}
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
lib_deps      = ${common.lib_deps}

; ---------------------------------------------------------------------------
; PRODUCTION board — Standard ESP32 DevKit V1
; ---------------------------------------------------------------------------
[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
build_flags   = ${common.build_flags}
lib_deps      = ${common.lib_deps}
