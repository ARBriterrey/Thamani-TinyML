events {
    worker_connections 1024;
}

http {
    # ── Upstream ─────────────────────────────────────────────────────────
    upstream orchestrator {
        server main-orchestrator:5000;
    }

    # ── HTTP → HTTPS redirect + ACME challenge ────────────────────────────
    server {
        listen 80;
        server_name _;

        # Let's Encrypt ACME challenge (certbot webroot)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all other HTTP traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS ─────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name ${DOMAIN};

        # Let's Encrypt certificates (managed by certbot container)
        ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;

        # TLS hardening
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Generous timeouts — MATLAB worker can take time even with async
        proxy_read_timeout    300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;

        # Proxy to Flask orchestrator
        location / {
            proxy_pass http://orchestrator;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Model file downloads — larger buffer for binary transfers
        location /api/jobs/ {
            proxy_pass            http://orchestrator;
            proxy_set_header Host $host;
            proxy_buffering       off;
            proxy_read_timeout    300s;
        }
    }
}
