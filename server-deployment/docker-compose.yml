services:
  # ─── nginx – TLS termination & reverse proxy (runs 24/7) ─────────────
  nginx:
    image: nginx:alpine
    container_name: medical-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/templates/nginx.conf.template:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - certbot-webroot:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    environment:
      - DOMAIN=${DOMAIN}
    command: >
      /bin/sh -c "envsubst '$$DOMAIN' < /etc/nginx/templates/nginx.conf.template
      > /etc/nginx/nginx.conf && nginx -g 'daemon off;'"
    depends_on:
      - main-orchestrator
    networks:
      - medical-net

  # ─── Certbot – certificate issuance & renewal ─────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: medical-certbot
    volumes:
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    # Run once to issue cert, then exit. Renewal is handled by the cron
    # command on the host:
    #   0 3 * * * docker compose run --rm certbot renew && docker compose restart nginx
    entrypoint: >
      certbot certonly --webroot --webroot-path=/var/www/certbot
      --email ${CERT_EMAIL} --agree-tos --no-eff-email
      -d ${DOMAIN}
    profiles:
      - certbot

  # ─── Main Orchestrator (runs 24/7) ────────────────────────────────────
  main-orchestrator:
    build:
      context: ./main-orchestrator
      dockerfile: Dockerfile
    container_name: medical-orchestrator
    restart: unless-stopped
    # Port 5000 is NOT exposed to the host — nginx is the only entry point
    expose:
      - "5000"
    volumes:
      - shared-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - FLASK_ENV=production
      - WORKER_IMAGE=thamani-tinyml-matlab-worker
      - SHARED_VOLUME=thamani-tinyml_shared-data
      - DATA_MOUNT_PATH=/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - medical-net

  # ─── MATLAB Worker (ephemeral – NOT auto-started) ────────────────────
  matlab-worker:
    build:
      context: ./matlab-worker
      dockerfile: Dockerfile
    image: thamani-tinyml-matlab-worker
    volumes:
      - shared-data:/data
    profiles:
      - worker
    networks:
      - medical-net

volumes:
  shared-data:
    name: thamani-tinyml_shared-data
    driver: local
  certbot-webroot:
    name: thamani-tinyml_certbot-webroot
  certbot-certs:
    name: thamani-tinyml_certbot-certs

networks:
  medical-net:
    driver: bridge
